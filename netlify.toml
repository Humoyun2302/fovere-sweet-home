# TanStack Start (Vite) — static output is dist/client, not dist/
# NETLIFY=true is set automatically on Netlify; vite.config.ts uses it for prerender.
#
# Required in Netlify UI → Environment variables (Builds scope or All scopes):
#   VITE_SUPABASE_URL=https://xxxx.supabase.co
#   VITE_SUPABASE_ANON_KEY=eyJ...  (anon public key from Supabase → Settings → API)
# Then: Deploys → Trigger deploy (env vars are baked in at build time, not runtime).
[build]
  command = "npm run build"
  publish = "dist/client"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
