# TanStack Start on Netlify uses @netlify/vite-plugin-tanstack-start (see vite.config.ts).
# Static assets: dist/client. SSR: .netlify/v1/functions/server.mjs (generated at build).
# Do NOT add a catch-all redirect to index.html — there is no static index; the SSR function serves pages.
#
# Required in Netlify UI → Environment variables (Builds scope or All scopes):
#   VITE_SUPABASE_URL=https://xxxx.supabase.co
#   VITE_SUPABASE_ANON_KEY=eyJ...  (anon public key from Supabase → Settings → API)
# Then: Deploys → Trigger deploy (env vars are baked in at build time, not runtime).
[build]
  command = "npm run build"
  publish = "dist/client"
